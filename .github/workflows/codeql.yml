# CodeQL static analysis (GitHub code scanning). Free on public repos; this was held back
# while the repo was private (it needs Advanced Security there). Python needs no build step,
# so init + analyze is the whole job. Actions are SHA-pinned (Dependabot bumps them via the
# `# tag` comment), matching the rest of .github/workflows.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so advisories that land after a commit still get flagged.
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload results to code scanning
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
