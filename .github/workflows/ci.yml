name: CI

on:
  push:
    branches: [main]
  pull_request:

# CI must NEVER spend API tokens (invariant 4). We do not expose ANTHROPIC_API_KEY
# to any job; every LLM-touching path runs against the mock / record-replay seam.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      # Tripwire: if any test tries to construct a real Anthropic client it will
      # fail fast rather than silently reach for an ambient key.
      ANTHROPIC_API_KEY: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type-check
        run: uv run mypy

      - name: Import-direction check
        run: uv run lint-imports

      - name: Test
        run: uv run pytest
