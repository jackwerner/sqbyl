name: CI

on:
  push:
    branches: [main]
  pull_request:

# CI must NEVER spend API tokens (invariant 4). We do not expose ANTHROPIC_API_KEY
# to any job; every LLM-touching path runs against the mock / record-replay seam.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      # Tripwire: if any test tries to construct a real Anthropic client it will
      # fail fast rather than silently reach for an ambient key.
      ANTHROPIC_API_KEY: ""
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type-check
        run: uv run mypy

      - name: Import-direction check
        run: uv run lint-imports

      - name: License-compatibility check
        # Fail if any dependency carries a strong-copyleft license (sqbyl is MIT and is
        # embedded into users' apps). The current tree is MIT/BSD/Apache/PSF/MPL-2.0.
        run: uv run --with pip-licenses pip-licenses --fail-on="GPL;AGPL;LGPL"

      - name: Test
        run: uv run pytest

  security:
    # Audit the locked dependency tree for known vulnerabilities (sqbyl-enhancements.md §5.1).
    # Runs alongside `quality`, never spends API tokens (invariant 4).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Audit dependencies for known vulnerabilities
        # Export the locked, non-editable dependency set (the workspace members
        # themselves have no published files to hash) and audit it against the
        # PyPI/OSV advisory databases. A known CVE in the tree fails the build.
        run: |
          uv export --frozen --no-emit-workspace --no-editable \
            --format requirements-txt > requirements-audit.txt
          uvx pip-audit -r requirements-audit.txt --progress-spinner off

  postgres:
    # Verify the first-class Postgres dialect against a REAL server (sqbyl-enhancements.md
    # §5.4): session read-only enforcement, privilege introspection, and schema introspect.
    # $0 — these tests touch only the DB safety layer, no LLM (invariant 4).
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: sqbyl
          POSTGRES_DB: sqbyl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SQBYL_TEST_POSTGRES_URL: postgresql+psycopg://postgres:sqbyl@127.0.0.1:5432/sqbyl_test
      # Tripwire: never reach for a real Anthropic key (invariant 4).
      ANTHROPIC_API_KEY: ""
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Postgres integration tests
        # psycopg is the optional [postgres] extra — add it just for this job.
        run: uv run --with 'psycopg[binary]>=3.3.4' pytest tests/test_postgres_integration.py -v
