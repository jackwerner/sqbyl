# Build both packages and publish to PyPI via Trusted Publishing (OIDC — no long-lived
# tokens) when a `v*` tag is pushed.
#
# ONE-TIME PyPI SETUP before the first run: register a PyPI Trusted Publisher for EACH
# package (`sqbyl` and `sqbyl-runtime`) pointing at this repository, workflow
# `release.yml`, and environment `pypi`. See https://docs.pypi.org/trusted-publishers/.
# Also reserve both project names on PyPI first.
#
# Tags should be cut from a green `main` (CI already gates lint/type/test/import/audit
# on every push there), so this workflow builds and publishes rather than re-testing.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build sqbyl-runtime
        run: uv build --package sqbyl-runtime --out-dir dist-runtime

      - name: Build sqbyl
        run: uv build --package sqbyl --out-dir dist-sqbyl

      - name: Generate SBOM (CycloneDX)
        # A machine-readable bill of materials of the deployable dependency tree, for
        # downstream supply-chain audits. Attached to the GitHub Release below.
        run: |
          uv export --frozen --no-emit-workspace --no-editable \
            --format requirements-txt > requirements-sbom.txt
          uvx --from cyclonedx-bom cyclonedx-py requirements requirements-sbom.txt \
            -o sbom.cdx.json

      - name: Upload distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: distributions
          path: |
            dist-runtime/
            dist-sqbyl/
            sbom.cdx.json

  publish-runtime:
    # Publish the runtime first — the toolkit pins it exactly, so it must exist on PyPI
    # before `sqbyl` is published.
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/sqbyl-runtime/
    permissions:
      id-token: write # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distributions

      - name: Publish sqbyl-runtime to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist-runtime/

  publish-sqbyl:
    needs: publish-runtime
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/sqbyl/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distributions

      - name: Publish sqbyl to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist-sqbyl/

  github-release:
    needs: publish-sqbyl
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release for this tag
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distributions

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        # Attach the SBOM so it's downloadable alongside the release.
        run: >
          gh release create "${{ github.ref_name }}"
          --title "${{ github.ref_name }}"
          --notes "See [CHANGELOG.md](CHANGELOG.md) for release notes."
          --verify-tag
          sbom.cdx.json
