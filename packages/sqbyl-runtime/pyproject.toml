[project]
name = "sqbyl-runtime"
version = "0.0.0"
description = "The minimal, dependency-light sqbyl runtime: load a release + ask() + structured logging."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Jack Werner" }]
dependencies = [
    "pydantic>=2.7,<3",
    "anthropic>=0.40",
    "sqlalchemy>=2.0",
    "duckdb>=1.0",
    "duckdb-engine>=0.13",
    "sqlglot>=25",
]

[project.optional-dependencies]
# Postgres driver is optional: DuckDB is the default test dialect, Postgres is the
# other M0 dialect. `pip install sqbyl-runtime[postgres]` to enable it.
postgres = ["psycopg[binary]>=3.1"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sqbyl_runtime"]
