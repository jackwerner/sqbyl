<!doctype html>
<meta charset="utf-8" />
<title>sqbyl review</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { color-scheme: light dark; --line: #8883; --ok: #2e7d32; --bad: #c62828; --dim: #8886; }
  * { box-sizing: border-box; }
  body { font: 14px/1.5 ui-sans-serif, system-ui, sans-serif; margin: 0; padding: 1.5rem;
         max-width: 860px; margin-inline: auto; }
  header { display: flex; align-items: baseline; gap: .75rem; border-bottom: 1px solid var(--line);
           padding-bottom: .75rem; margin-bottom: 1rem; }
  h1 { font-size: 1.1rem; margin: 0; }
  .tabs { margin-left: auto; display: flex; gap: .4rem; }
  .tab { cursor: pointer; border: 1px solid var(--line); border-radius: 7px; padding: .15rem .6rem;
         font-size: .82rem; color: var(--dim); background: transparent; }
  .tab.active { color: inherit; background: #8881; font-weight: 600; }
  .counts { color: var(--dim); font-size: .85rem; }
  .card { border: 1px solid var(--line); border-radius: 10px; padding: 1rem 1.15rem; }
  .card.reviewed { opacity: .72; }
  .done { border: 1px solid var(--ok); border-radius: 10px; color: var(--ok);
          padding: .7rem 1rem; margin-bottom: .8rem; font-weight: 600; }
  .q { font-size: 1.15rem; font-weight: 600; margin: 0 0 .35rem; }
  .meta { color: var(--dim); font-size: .8rem; margin-bottom: .75rem; }
  .badge { display: inline-block; border: 1px solid var(--line); border-radius: 999px;
           padding: 0 .5rem; margin-right: .35rem; }
  .badge.ok { color: var(--ok); border-color: var(--ok); }
  .badge.bad { color: var(--bad); border-color: var(--bad); }
  pre, textarea { font: 12.5px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace; }
  pre { background: #8881; border-radius: 8px; padding: .7rem .8rem; overflow-x: auto; margin: 0; }
  textarea { width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: .6rem; }
  label { display: block; font-size: .8rem; color: var(--dim); margin: .6rem 0 .2rem; }
  table { border-collapse: collapse; width: 100%; font-size: 12.5px; margin-top: .3rem; }
  th, td { border: 1px solid var(--line); padding: .3rem .5rem; text-align: left; white-space: nowrap; }
  th { background: #8881; }
  .rowcount { color: var(--dim); font-size: .78rem; margin-top: .3rem; }
  .keys { margin-top: 1rem; color: var(--dim); font-size: .82rem; }
  kbd { border: 1px solid var(--line); border-bottom-width: 2px; border-radius: 5px;
        padding: 0 .35rem; font-family: inherit; }
  button { font: inherit; padding: .3rem .7rem; border: 1px solid var(--line);
           border-radius: 7px; background: #8881; cursor: pointer; }
  .toast { position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
           background: #000c; color: #fff; padding: .4rem .9rem; border-radius: 8px;
           font-size: .85rem; opacity: 0; transition: opacity .15s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .empty { text-align: center; color: var(--dim); padding: 3rem 0; }
  .rerun-msg.bad { color: var(--bad); }
  .rerun-msg.ok { color: var(--ok); }
  .judge { margin: .15rem 0; font-size: .85rem; }
  .rationale { color: var(--dim); }
  .headline { font-size: .85rem; color: var(--dim); margin-bottom: .8rem; }
  .headline b { color: inherit; }
  .meter { border: 1px solid var(--line); border-radius: 10px; padding: .7rem .9rem;
           margin-bottom: 1rem; display: flex; align-items: baseline; gap: .6rem; }
  .meter .big { font-size: 1.25rem; font-weight: 700; }
  .meter .sub { color: var(--dim); font-size: .82rem; }
  .caveat { color: var(--bad); }
  .applied { color: var(--dim); font-size: .82rem; margin-bottom: .8rem; }
  .qcard { border: 1px solid var(--line); border-radius: 10px; padding: .8rem 1rem;
           margin-bottom: .6rem; }
  .qcard.focus { border-color: var(--dim); background: #8881; }
  .qcard .lev { color: var(--ok); font-weight: 600; }
  .qcard .human { color: var(--bad); }
  .kind { text-transform: uppercase; font-size: .68rem; letter-spacing: .04em; color: var(--dim); }
</style>

<header>
  <h1>sqbyl review</h1>
  <span class="counts" id="counts"></span>
  <div class="tabs">
    <button class="tab active" id="tab-queue">queue</button>
    <button class="tab" id="tab-candidates">candidates</button>
    <button class="tab" id="tab-review">judge review</button>
  </div>
</header>

<main id="main"></main>

<div class="keys" id="keys"></div>

<div class="toast" id="toast"></div>

<script>
const $ = (s) => document.querySelector(s);
let mode = "queue";       // "queue" | "candidates" | "review"

// attention-queue state
let cards = [];
let cardIdx = 0;
let readiness = null;
let autoApplied = [];

// candidate-queue state
let queue = [];
let idx = 0;
let editing = false;

// judge-review state
let reviewRows = [];
let reviewIdx = 0;
let headline = null;

function toast(msg) {
  const t = $("#toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove("show"), 1400);
}

function setMode(m) {
  mode = m;
  $("#tab-queue").classList.toggle("active", m === "queue");
  $("#tab-candidates").classList.toggle("active", m === "candidates");
  $("#tab-review").classList.toggle("active", m === "review");
  if (m === "queue") loadQueue();
  else if (m === "candidates") load();
  else loadReview();
}

// ---- attention queue (Phase 6.3) ------------------------------------------------------

async function loadQueue() {
  const data = await (await fetch("/api/queue")).json();
  readiness = data.readiness;
  cards = data.queue || [];
  autoApplied = data.auto_applied || [];
  if (cardIdx >= cards.length) cardIdx = Math.max(0, cards.length - 1);
  renderQueue();
}

function renderQueue() {
  $("#keys").innerHTML = `<kbd>a</kbd> accept · <kbd>A</kbd> apply all high-confidence · <kbd>↑</kbd>/<kbd>↓</kbd> move`;
  $("#counts").textContent = "";
  const main = $("#main");
  if (!readiness) {
    main.innerHTML = `<div class="empty">No eval run yet.<br>Run <code>sqbyl eval dev</code> then <code>sqbyl coach</code>.</div>`;
    return;
  }
  const r = readiness;
  const caveat = r.low_confidence
    ? `<span class="caveat">· small eval set (n=${r.n}); ${pct(r.accuracy_low)}–${pct(r.accuracy_high)}</span>`
    : "";
  const meter = `<div class="meter"><span class="big">${esc(r.headline)}</span>
    <span class="sub">${caveat}</span></div>`;
  const auto = autoApplied.length
    ? `<div class="applied">${autoApplied.length} high-confidence, ready to apply
        <button id="apply-all" style="margin-left:.4rem">apply all (A)</button>
        <span class="sub">— edits are working-tree changes; review with <code>git diff</code>, undo with <code>git checkout</code></span></div>`
    : "";
  if (!cards.length) {
    main.innerHTML = meter + auto + `<div class="empty">Queue clear — nothing needs you. 🎉<br>
      ${r.reached ? "Readiness target reached — <code>sqbyl release create</code> when ready." : "Re-run <code>sqbyl eval dev</code> to refresh."}</div>`;
    if (autoApplied.length) $("#apply-all").onclick = applyAllHighConfidence;
    return;
  }
  const list = cards.map((c, i) => {
    // Leverage carries the same "~ projected" honesty as the meter — it's an estimate, not a
    // measured gain. Confidence means different things per card (judge ambiguity vs the Coach's
    // own uncalibrated self-estimate), so say which.
    const human = c.requires_human ? `<span class="human">needs you</span>` : `<span class="lev">▸ ~+${pct(c.leverage)}</span>`;
    const affected = c.affected_questions.length ? ` · ${c.affected_questions.length} question(s)` : "";
    const confNote = c.kind === "judge_review" ? "judge agreement" : c.kind === "blocked" ? "" : "self-estimated, uncalibrated";
    const conf = confNote ? `${pct(c.confidence)} confident (${confNote})` : "";
    return `<div class="qcard ${i === cardIdx ? "focus" : ""}">
      <div class="kind">${esc(c.kind.replace(/_/g, " "))}${conf ? " · " + conf : ""}${affected}</div>
      <p class="q" style="font-size:1rem">${esc(c.title)} ${human}</p>
      ${c.detail ? `<div class="rationale" style="font-size:.85rem">${esc(c.detail)}</div>` : ""}
      ${c.suggestion ? `<pre style="margin-top:.5rem">${esc(c.suggestion)}</pre>` : ""}
      <div style="margin-top:.6rem"><button data-i="${i}" class="acc">accept${c.requires_human ? " (confirm)" : ""}</button></div>
    </div>`;
  }).join("");
  main.innerHTML = meter + auto + list;
  if (autoApplied.length) $("#apply-all").onclick = applyAllHighConfidence;
  main.querySelectorAll("button.acc").forEach((b) => {
    b.onclick = () => acceptDecision(cards[Number(b.dataset.i)]);
  });
}

async function applyAllHighConfidence() {
  // The §5.5 "A" affordance: apply every high-confidence card in one click (each is undoable
  // via git). Applying happens here on an explicit action, never silently on load.
  const pending = [...autoApplied];
  let ok = 0, failed = 0, last = null;
  for (const c of pending) {
    last = await post(`/api/queue/${encodeURIComponent(c.id)}/accept`, {});
    last.ok === false ? failed++ : ok++;
  }
  if (last) { readiness = last.readiness; cards = last.queue || []; autoApplied = last.auto_applied || []; }
  toast(failed ? `applied ${ok}, ${failed} failed` : `applied ${ok} high-confidence`);
  renderQueue();
}

async function acceptDecision(card) {
  if (!card) return;
  const res = await post(`/api/queue/${encodeURIComponent(card.id)}/accept`, {});
  if (res.ok === false) { toast(`✗ ${res.detail || "could not apply"}`); }
  // Name the file written + how to undo it — an applied edit is a working-tree change.
  else if (res.changed) { toast(`applied → ${res.changed} · undo: git checkout ${res.changed}`); }
  else { toast(`accepted — ${card.title}`); }
  // Re-render from the fresh payload the server returned, so the meter moves live.
  readiness = res.readiness;
  cards = res.queue || [];
  autoApplied = res.auto_applied || [];
  if (cardIdx >= cards.length) cardIdx = Math.max(0, cards.length - 1);
  renderQueue();
}

// ---- candidate queue (Phase 4) --------------------------------------------------------

async function load() {
  const data = await (await fetch("/api/candidates")).json();
  const c = data.counts;
  $("#counts").textContent = `${c.pending} pending · ${c.accepted} accepted · ${c.rejected} rejected`;
  queue = data.candidates.filter((x) => x.status === "pending");
  if (idx >= queue.length) idx = Math.max(0, queue.length - 1);
  render();
}

function evidenceTable(ev) {
  if (!ev || !ev.columns.length) return "";
  const head = ev.columns.map((c) => `<th>${esc(c)}</th>`).join("");
  const body = ev.rows.map((r) => "<tr>" + r.map((v) => `<td>${esc(fmt(v))}</td>`).join("") + "</tr>").join("");
  const more = ev.row_count > ev.rows.length ? ` (showing ${ev.rows.length} of ${ev.row_count})` : "";
  return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>
          <div class="rowcount">${ev.row_count} row(s)${more}</div>`;
}

function render() {
  $("#keys").innerHTML = `<kbd>a</kbd> accept · <kbd>e</kbd> edit · <kbd>r</kbd> reject ·
    <kbd>A</kbd> accept all · in edit: <kbd>⌘/Ctrl+Enter</kbd> re-run`;
  const main = $("#main");
  if (!queue.length) {
    main.innerHTML = `<div class="empty">No pending candidates. 🎉<br>Run <code>sqbyl synth</code> to propose more.</div>`;
    return;
  }
  const c = queue[idx];
  const badges = [
    c.difficulty ? `<span class="badge">${esc(c.difficulty)}</span>` : "",
    c.canonical ? "" : `<span class="badge">variant of ${esc(c.variant_of || "?")}</span>`,
    c.seed ? `<span class="badge">${esc(c.seed)}</span>` : "",
  ].join("");
  if (!editing) {
    main.innerHTML = `
      <div class="card">
        <p class="q">${esc(c.question)}</p>
        <div class="meta">${idx + 1} / ${queue.length} · <code>${esc(c.id)}</code> ${badges}</div>
        <pre>${esc(c.gold_sql)}</pre>
        ${evidenceTable(c.evidence)}
      </div>`;
  } else {
    main.innerHTML = `
      <div class="card">
        <label>question</label>
        <textarea id="edit-q" rows="2">${esc(c.question)}</textarea>
        <label>gold SQL</label>
        <textarea id="edit-sql" rows="6">${esc(c.gold_sql)}</textarea>
        <div style="margin-top:.6rem; display:flex; gap:.5rem; align-items:center">
          <button id="btn-rerun">re-run (⌘/Ctrl+Enter)</button>
          <button id="btn-accept">accept edited</button>
          <button id="btn-cancel">cancel</button>
          <span class="rerun-msg" id="rerun-msg"></span>
        </div>
        <div id="rerun-out">${evidenceTable(c.evidence)}</div>
      </div>`;
    $("#btn-rerun").onclick = rerun;
    $("#btn-accept").onclick = () => accept(true);
    $("#btn-cancel").onclick = () => { editing = false; render(); };
    $("#edit-sql").focus();
  }
}

async function rerun() {
  const gold_sql = $("#edit-sql").value;
  const res = await post(`/api/candidates/${queue[idx].id}/rerun`, { gold_sql });
  const msg = $("#rerun-msg");
  if (res.ok) {
    msg.className = "rerun-msg ok"; msg.textContent = "✓ runs";
    $("#rerun-out").innerHTML = evidenceTable(res.evidence);
  } else {
    msg.className = "rerun-msg bad"; msg.textContent = `✗ ${res.reason}: ${res.detail || ""}`;
  }
}

async function accept(edited) {
  const c = queue[idx];
  const body = edited
    ? { question: $("#edit-q").value, gold_sql: $("#edit-sql").value }
    : {};
  const res = await post(`/api/candidates/${c.id}/accept`, body);
  if (res.ok === false) {
    toast(`✗ not accepted — gold SQL ${res.reason}`);
    return;
  }
  toast(res.added_to_dev ? `accepted → benchmarks/dev.yaml` : "already in dev.yaml");
  editing = false;
  await load();
}

async function reject() {
  await post(`/api/candidates/${queue[idx].id}/reject`, {});
  toast("rejected");
  await load();
}

async function acceptAll() {
  const pending = [...queue];
  let ok = 0, refused = 0;
  for (const c of pending) {
    const res = await post(`/api/candidates/${c.id}/accept`, {});
    res.ok === false ? refused++ : ok++;
  }
  toast(refused ? `accepted ${ok}, ${refused} no longer run` : `accepted ${ok} candidate(s)`);
  await load();
}

// ---- judge review (Phase 5.2) ---------------------------------------------------------

async function loadReview() {
  const data = await (await fetch("/api/review?split=dev")).json();
  headline = data.run;
  reviewRows = data.rows || [];
  // Land on the first unreviewed row so a reviewer works the pile top-down.
  const firstOpen = reviewRows.findIndex((r) => !r.reviewed);
  reviewIdx = firstOpen === -1 ? 0 : firstOpen;
  renderReview();
}

function pct(x) { return x == null ? "—" : (x * 100).toFixed(0) + "%"; }

function renderReview() {
  $("#keys").innerHTML = `<kbd>g</kbd> agree with judge · <kbd>c</kbd> correct ·
    <kbd>x</kbd> incorrect · <kbd>s</kbd> keep in review · <kbd>←</kbd>/<kbd>→</kbd> prev/next`;
  const main = $("#main");
  if (!headline) {
    main.innerHTML = `<div class="empty">No eval run yet.<br>Run <code>sqbyl eval dev</code> first.</div>`;
    $("#counts").textContent = "";
    return;
  }
  const ag = headline.agreement;
  $("#counts").innerHTML =
    `<span class="headline">deterministic <b>${pct(headline.accuracy)}</b> · ` +
    `resolved <b>${pct(headline.resolved_accuracy)}</b> · ` +
    `${headline.n_unreviewed} to review · ` +
    `judge↔human agreement (reviewed rows) <b>${pct(ag.rate)}</b>${ag.n ? ` (${ag.n_agree}/${ag.n})` : ""}</span>`;

  if (!reviewRows.length) {
    main.innerHTML = `<div class="empty">Nothing to review — the deterministic scorers resolved every row. 🎉</div>`;
    return;
  }
  const r = reviewRows[reviewIdx];
  const sug = r.judge_suggestion;
  const sugLabel = { correct: "likely-equivalent", incorrect: "likely-wrong", manual_review: "ambiguous" }[sug] || "no suggestion";
  const judges = r.judge_verdicts.map((j) =>
    `<div class="judge">${j.passed ? "✓" : "✗"} <b>${esc(j.judge)}</b>
       <span class="rationale">(${pct(j.confidence)}) — ${esc(j.rationale || "")}</span></div>`
  ).join("");
  const resolved = r.reviewed
    ? `<span class="badge ${r.human_verdict === "correct" ? "ok" : r.human_verdict === "incorrect" ? "bad" : ""}">you: ${esc(r.human_verdict)}</span>`
    : "";
  // Positive "you're done" signal once every row in the pile is resolved — the just-resolved
  // card stays below (dimmed) so a call can still be revisited/changed (finding #10).
  const allReviewed = reviewRows.every((x) => x.reviewed);
  const doneBanner = allReviewed
    ? `<div class="done">✓ All ${reviewRows.length} row(s) reviewed — nothing left in the pile. 🎉
        <span class="rationale">You can still arrow back to revisit or change any call.</span></div>`
    : "";
  main.innerHTML = doneBanner + `
    <div class="card${r.reviewed ? " reviewed" : ""}">
      <p class="q">${esc(r.question)}</p>
      <div class="meta">${reviewIdx + 1} / ${reviewRows.length} · <code>${esc(r.id)}</code>
        <span class="badge">judge: ${sugLabel}</span> ${resolved}</div>
      <label>generated SQL</label>
      <pre>${esc(r.generated_sql)}</pre>
      <label>gold SQL</label>
      <pre>${esc(r.gold_sql || "(none)")}</pre>
      <label>why it needs review</label>
      ${judges || '<div class="rationale">no judge ran on this row.</div>'}
      <div style="margin-top:.7rem; display:flex; gap:.5rem; flex-wrap:wrap">
        <button id="rv-agree">agree with judge (g)</button>
        <button id="rv-correct">correct (c)</button>
        <button id="rv-incorrect">incorrect (x)</button>
        <button id="rv-keep">keep in review (s)</button>
      </div>
    </div>`;
  $("#rv-agree").onclick = () => resolve(sug || "manual_review");
  $("#rv-correct").onclick = () => resolve("correct");
  $("#rv-incorrect").onclick = () => resolve("incorrect");
  $("#rv-keep").onclick = () => resolve("manual_review");
}

async function resolve(verdict) {
  const r = reviewRows[reviewIdx];
  if (!r) return;
  const res = await post(`/api/review/${r.id}/resolve`, { verdict, split: "dev" });
  if (res.ok === false || res.detail) { toast(`✗ ${res.detail || "could not resolve"}`); return; }
  headline = res.run;
  reviewRows[reviewIdx] = res.row;
  const agreed = r.judge_suggestion && verdict === r.judge_suggestion;
  toast(`resolved ${verdict}${r.judge_suggestion ? (agreed ? " · agreed with judge" : " · overrode judge") : ""}`);
  // Advance to the next still-unreviewed row: prefer one after the current, else wrap to the
  // first open row anywhere. If none remain open, stay put — renderReview() shows the "pile
  // complete" banner so finishing the last row reads as done, not ignored (finding #10).
  let next = reviewRows.findIndex((x, i) => i > reviewIdx && !x.reviewed);
  if (next === -1) next = reviewRows.findIndex((x) => !x.reviewed);
  if (next !== -1) reviewIdx = next;
  renderReview();
}

// ---- shared ---------------------------------------------------------------------------

async function post(url, body) {
  return (await fetch(url, {
    method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body),
  })).json();
}

const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const fmt = (v) => v === null ? "∅" : v;

$("#tab-queue").onclick = () => setMode("queue");
$("#tab-candidates").onclick = () => setMode("candidates");
$("#tab-review").onclick = () => setMode("review");

document.addEventListener("keydown", (e) => {
  const inField = ["TEXTAREA", "INPUT"].includes(e.target.tagName);
  if (mode === "queue") {
    if (inField) return;
    if (e.key === "A") { e.preventDefault(); if (autoApplied.length) applyAllHighConfidence(); return; }
    if (!cards.length) return;
    if (e.key === "a") { e.preventDefault(); acceptDecision(cards[cardIdx]); }
    else if (e.key === "ArrowDown") { e.preventDefault(); cardIdx = Math.min(cards.length - 1, cardIdx + 1); renderQueue(); }
    else if (e.key === "ArrowUp") { e.preventDefault(); cardIdx = Math.max(0, cardIdx - 1); renderQueue(); }
    return;
  }
  if (mode === "review") {
    if (inField || !reviewRows.length) return;
    if (e.key === "g") { e.preventDefault(); $("#rv-agree").click(); }
    else if (e.key === "c") { e.preventDefault(); resolve("correct"); }
    else if (e.key === "x") { e.preventDefault(); resolve("incorrect"); }
    else if (e.key === "s") { e.preventDefault(); resolve("manual_review"); }
    else if (e.key === "ArrowRight") { e.preventDefault(); reviewIdx = Math.min(reviewRows.length - 1, reviewIdx + 1); renderReview(); }
    else if (e.key === "ArrowLeft") { e.preventDefault(); reviewIdx = Math.max(0, reviewIdx - 1); renderReview(); }
    return;
  }
  if (editing) {
    if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); rerun(); }
    if (e.key === "Escape") { editing = false; render(); }
    return;
  }
  if (inField || !queue.length) return;
  if (e.key === "a") { e.preventDefault(); accept(false); }
  else if (e.key === "A") { e.preventDefault(); acceptAll(); }
  else if (e.key === "e") { e.preventDefault(); editing = true; render(); }
  else if (e.key === "r") { e.preventDefault(); reject(); }
});

setMode("queue");
</script>
