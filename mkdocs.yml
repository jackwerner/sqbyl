site_name: sqbyl
site_description: >-
  An open-source, LLM-powered toolkit for building, evaluating, and iterating on
  text-to-SQL agents over your own database.
site_url: https://jackwerner.github.io/sqbyl/
site_author: Jack Werner

repo_url: https://github.com/jackwerner/sqbyl
repo_name: jackwerner/sqbyl
edit_uri: edit/main/docs/

copyright: Copyright &copy; Jack Werner — MIT licensed

theme:
  name: material
  custom_dir: overrides
  logo: assets/sqbyl-icon.png
  favicon: assets/sqbyl-icon.png
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jackwerner/sqbyl
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/sqbyl/

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - "Case study: 70% → 96%": case-study.md
  - Concepts: concepts.md
  - Guides:
      - Embedding the runtime: guides/embedding.md
      - Configuration reference: guides/configuration.md
  - CLI reference: cli.md
  - Design &amp; internals:
      - Design spec: sqbyl-design-spec.md
      - User journey: sqbyl-user-journey.md
      - Implementation plan: sqbyl-implementation-plan.md
